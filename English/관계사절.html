<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관계사절 마스터 · Relative Clauses (Unit 90–95)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#17222E; --ink-soft:#4A5A68; --paper:#F4F6F5; --card:#FFFFFF;
  --line:#DCE3E2; --teal:#0E7C86; --teal-d:#0A5C64; --teal-l:#E3F1F1;
  --amber:#E08A2B; --amber-l:#FBEEDD; --rose:#C0455B; --rose-l:#FBE7EB;
  --green:#2E8B57; --green-l:#E4F2EA; --shadow:0 1px 2px rgba(20,40,50,.06),0 8px 24px rgba(20,40,50,.06);
  --disp:"Fraunces",Georgia,serif; --ui:"Space Grotesk","Noto Sans KR",sans-serif; --body:"Noto Sans KR",system-ui,sans-serif;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);line-height:1.6;
  background-image:radial-gradient(circle at 1px 1px,rgba(14,124,134,.05) 1px,transparent 0);background-size:22px 22px;}
.wrap{max-width:960px;margin:0 auto;padding:0 18px 80px}
a{color:var(--teal)}
button{font-family:var(--ui);cursor:pointer}

/* Header */
header{padding:30px 0 14px}
.eyebrow{font-family:var(--ui);font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:12px;color:var(--teal);margin:0}
h1{font-family:var(--disp);font-weight:600;font-size:clamp(28px,5vw,44px);line-height:1.05;margin:6px 0 4px;letter-spacing:-.01em}
h1 .thread{position:relative;white-space:nowrap}
h1 .thread::after{content:"";position:absolute;left:0;right:0;bottom:2px;height:8px;background:var(--amber-l);z-index:-1;border-radius:4px}
.sub{color:var(--ink-soft);font-size:15px;margin:2px 0 0}

/* Voice bar */
.voicebar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:10px 14px;margin:16px 0 6px;box-shadow:var(--shadow)}
.voicebar .vlabel{font-family:var(--ui);font-weight:600;font-size:12px;color:var(--ink-soft);letter-spacing:.04em}
.seg{display:inline-flex;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
.seg button{border:0;background:transparent;color:var(--ink-soft);font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px;transition:.15s}
.seg button.on{background:var(--teal);color:#fff;box-shadow:0 1px 3px rgba(14,124,134,.4)}
.testvoice{margin-left:auto;border:1px solid var(--line);background:var(--card);color:var(--teal);border-radius:10px;padding:8px 14px;font-weight:600;font-size:13px}
.testvoice:hover{background:var(--teal-l)}

/* Tabs */
.tabs{display:flex;gap:6px;position:sticky;top:0;z-index:20;background:var(--paper);padding:12px 0 10px;flex-wrap:wrap}
.tabs button{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-weight:600;font-size:14px;
  padding:9px 16px;border-radius:11px;transition:.15s;display:flex;align-items:center;gap:7px}
.tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.tabs button .pill{background:var(--rose);color:#fff;font-size:11px;padding:1px 7px;border-radius:20px;min-width:18px;text-align:center}
.tabs button.on .pill{background:var(--amber)}

.panel{display:none;animation:fade .3s}
.panel.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Unit nav */
.unitnav{display:flex;gap:8px;overflow-x:auto;padding:14px 0 8px;-webkit-overflow-scrolling:touch}
.unitnav button{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:8px 14px;
  font-family:var(--ui);font-weight:600;font-size:13px;color:var(--ink-soft)}
.unitnav button.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.unitnav button b{font-family:var(--disp);font-size:15px;margin-right:6px}

/* Unit card */
.ucard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.ucard .utag{font-family:var(--ui);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--amber)}
.ucard h2{font-family:var(--disp);font-weight:600;font-size:24px;margin:4px 0 2px}
.ucard .en-sub{font-family:var(--ui);color:var(--teal);font-weight:600;font-size:15px;margin:0 0 14px}
.easybox{background:var(--teal-l);border-left:4px solid var(--teal);border-radius:0 12px 12px 0;padding:14px 16px;margin:6px 0 14px}
.easybox p{margin:0;font-size:15px;color:var(--ink)}
.points{list-style:none;padding:0;margin:0 0 6px;display:grid;gap:8px}
.points li{display:flex;gap:10px;font-size:14.5px;color:var(--ink)}
.points li::before{content:"→";color:var(--amber);font-weight:700;flex:0 0 auto}
.exhead{font-family:var(--ui);font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.exhead::before{content:"";height:1px;width:20px;background:var(--line)}

/* Example sentence */
.ex{border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;background:var(--card);transition:.15s}
.ex:hover{border-color:var(--teal)}
.ex .en{font-size:17px;line-height:1.9;color:var(--ink);word-spacing:1px}
.ex .en .w{cursor:pointer;border-radius:5px;padding:1px 2px;transition:background .12s}
.ex .en .w:hover{background:var(--amber-l)}
.ex .en .rel{color:var(--teal-d);font-weight:700;background:var(--teal-l);border-radius:6px;padding:1px 5px}
.ex .en .rel:hover{background:#cfeaea}
.ex .tools{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.ex .tools button{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px}
.ex .tools button:hover{border-color:var(--teal);color:var(--teal)}
.ex .ko{display:none;margin-top:10px;padding:11px 14px;background:var(--paper);border-radius:10px;font-size:15px;color:var(--ink);border:1px dashed var(--line)}
.ex .ko.show{display:block}
.hintword{font-size:12px;color:var(--ink-soft);margin-top:8px}

/* Download btn */
.dlrow{margin:8px 0 26px;display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{background:var(--teal);color:#fff;border:0;border-radius:12px;padding:13px 20px;font-weight:700;font-size:15px;display:inline-flex;align-items:center;gap:9px;box-shadow:0 2px 8px rgba(14,124,134,.35)}
.btn-primary:hover{background:var(--teal-d)}
.btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:13px 20px;font-weight:600;font-size:15px}

/* Tooltip */
#tip{position:fixed;z-index:100;max-width:320px;background:#fff;border:1px solid var(--line);border-radius:16px;
  box-shadow:0 12px 40px rgba(20,40,50,.22);padding:0;display:none;overflow:hidden}
#tip .tip-h{background:var(--ink);color:#fff;padding:13px 16px}
#tip .tip-word{font-family:var(--disp);font-size:21px;font-weight:600;line-height:1.1}
#tip .tip-ipa{font-family:var(--ui);color:#9fd3d6;font-size:14px;margin-top:2px}
#tip .tip-b{padding:14px 16px}
#tip .tip-mean{font-size:15px;color:var(--ink);margin:0 0 8px}
#tip .tip-mean b{color:var(--teal-d)}
#tip .tip-ex{font-size:13.5px;color:var(--ink);background:var(--paper);border-radius:9px;padding:9px 11px;margin-top:8px}
#tip .tip-ex .ee{display:block}
#tip .tip-ex .kk{display:block;color:var(--ink-soft);margin-top:3px}
#tip .tip-play{margin-top:10px;width:100%;background:var(--amber-l);color:#8a5410;border:0;border-radius:10px;padding:9px;font-weight:700;font-size:13px}
#tip .tip-play:hover{background:#f6e0c2}
#tip .tip-x{position:absolute;top:10px;right:12px;background:rgba(255,255,255,.15);border:0;color:#fff;width:24px;height:24px;border-radius:50%;font-size:14px;line-height:1}

/* Quiz */
.quiz-top{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin:16px 0;box-shadow:var(--shadow);position:sticky;top:58px;z-index:15}
.quiz-top .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.progress{flex:1;min-width:160px;height:9px;background:var(--paper);border-radius:20px;overflow:hidden;border:1px solid var(--line)}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--green));width:0;transition:.3s}
.qstat{font-family:var(--ui);font-weight:700;font-size:14px;color:var(--ink)}
.qstat .g{color:var(--green)} .qstat .r{color:var(--rose)}
.filterbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.filterbar button{border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);border-radius:20px;padding:5px 12px;font-size:12.5px;font-weight:600}
.filterbar button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

.q{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.q .qmeta{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.q .qnum{font-family:var(--disp);font-weight:700;color:var(--teal)}
.q .badge{font-family:var(--ui);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.b-lv{background:var(--amber-l);color:#8a5410}
.b-un{background:var(--teal-l);color:var(--teal-d)}
.q .stem{font-size:16.5px;line-height:1.7;margin:2px 0 14px;color:var(--ink)}
.q .stem code{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:1px 8px;font-family:var(--ui);color:var(--teal-d);font-weight:700}
.opts{display:grid;gap:9px}
.opt{display:flex;gap:12px;align-items:flex-start;border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:12px 14px;font-size:15px;text-align:left;color:var(--ink);transition:.15s;width:100%;font-family:var(--body)}
.opt:not(.locked):hover{border-color:var(--teal);background:var(--teal-l)}
.opt .key{font-family:var(--ui);font-weight:700;flex:0 0 auto;width:22px;height:22px;border-radius:7px;background:var(--paper);border:1px solid var(--line);display:grid;place-items:center;font-size:12px;color:var(--ink-soft)}
.opt.correct{border-color:var(--green);background:var(--green-l)}
.opt.correct .key{background:var(--green);color:#fff;border-color:var(--green)}
.opt.wrong{border-color:var(--rose);background:var(--rose-l)}
.opt.wrong .key{background:var(--rose);color:#fff;border-color:var(--rose)}
.opt.locked{cursor:default;opacity:.75}
.opt.locked.correct,.opt.locked.wrong{opacity:1}
.explain{display:none;margin-top:12px;background:var(--paper);border-radius:11px;padding:12px 14px;font-size:14px;color:var(--ink);border-left:3px solid var(--teal)}
.explain.show{display:block}
.explain b{color:var(--teal-d)}

.empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
.empty .big{font-family:var(--disp);font-size:22px;color:var(--ink);margin-bottom:6px}
.note-card{background:var(--rose-l);border:1px solid #f0c9d1;border-radius:14px;padding:14px 16px;margin-bottom:14px;font-size:14px;color:#7a2233}
.note-card b{color:var(--rose)}
footer{text-align:center;color:var(--ink-soft);font-size:13px;padding:30px 0 10px;font-family:var(--ui)}
@media(max-width:560px){.ucard{padding:18px 15px}.quiz-top{top:52px}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <p class="eyebrow">Grammar in Use · Unit 90–95</p>
  <h1>관계사절 <span class="thread">마스터</span></h1>
  <p class="sub">who · that · which · whose · whom · where · 추가정보절 · -ing/-ed &nbsp;— 듣고, 클릭하고, 풀어보세요.</p>
</header>

<div class="voicebar">
  <span class="vlabel">발음</span>
  <div class="seg" id="segAccent">
    <button data-acc="en-US" class="on">🇺🇸 미국</button>
    <button data-acc="en-GB">🇬🇧 영국</button>
  </div>
  <div class="seg" id="segGender">
    <button data-gen="male" class="on">남성</button>
    <button data-gen="female">여성</button>
  </div>
  <button class="testvoice" id="testVoice">🔊 발음 테스트</button>
</div>

<nav class="tabs" id="tabs">
  <button data-tab="learn" class="on">📖 설명 &amp; 예문</button>
  <button data-tab="quiz">📝 문제 <span class="pill" id="quizProg">0</span></button>
  <button data-tab="wrong">🗂️ 오답노트 <span class="pill" id="wrongCount">0</span></button>
</nav>

<!-- LEARN -->
<section class="panel on" id="panel-learn">
  <div class="unitnav" id="unitnav"></div>
  <div id="learnBody"></div>
  <div class="dlrow">
    <button class="btn-primary" id="dlDocx">⬇️ 설명 전체 WORD(.docx) 다운로드</button>
    <button class="btn-ghost" id="dlThisUnit">이 단원만 저장</button>
  </div>
</section>

<!-- QUIZ -->
<section class="panel" id="panel-quiz">
  <div class="quiz-top">
    <div class="row">
      <div class="progress"><i id="progBar"></i></div>
      <div class="qstat"><span id="qDone">0</span>/120 · <span class="g" id="qRight">0</span>정답 · <span class="r" id="qWrong">0</span>오답</div>
    </div>
    <div class="filterbar" id="qFilter">
      <button data-f="all" class="on">전체 120</button>
      <button data-f="90">U90</button><button data-f="91">U91</button><button data-f="92">U92</button>
      <button data-f="93">U93</button><button data-f="94">U94</button><button data-f="95">U95</button>
      <button data-f="todo">안 푼 문제</button>
    </div>
  </div>
  <div id="quizBody"></div>
</section>

<!-- WRONG -->
<section class="panel" id="panel-wrong">
  <div id="wrongBody"></div>
</section>

<footer>데이비드앤드컴퍼니 · 관계사절 학습앱 · 단어를 클릭하면 뜻·발음·예문이 나와요.</footer>
</div>

<div id="tip"></div>

<script>
/* ============================ DATA ============================ */
const UNITS = [
 {id:90,tag:"관계사절 1",title:"who / that / which",sub:"관계사가 뒤 문장의 '주어' 역할",
  easy:"관계사절은 두 문장을 하나로 이어주는 '설명 꼬리표'예요. 사람을 설명하면 who, 사물·동물을 설명하면 which, 둘 다 쓸 수 있는 만능 단어는 that! 여기서는 관계사가 뒤 문장에서 '누가/무엇이'처럼 주어 역할을 해요.",
  points:["who = 사람을 설명해요 (사람 뒤에)","which = 사물·동물을 설명해요","that = 사람·사물 모두에 쓸 수 있어요","관계사 바로 뒤에 동사가 와요 (주어 역할이라서요)"],
  ex:[
   {en:"The girl who is singing is my sister.",ko:"노래하고 있는 그 소녀는 내 여동생이야.",rel:["who"]},
   {en:"I have a cat which has blue eyes.",ko:"나는 파란 눈을 가진 고양이가 있어.",rel:["which"]},
   {en:"The boy who won the race is my friend.",ko:"그 경주에서 이긴 소년은 내 친구야.",rel:["who"]},
   {en:"This is the bus that goes to the zoo.",ko:"이건 동물원으로 가는 버스야.",rel:["that"]},
   {en:"People who read a lot know many words.",ko:"책을 많이 읽는 사람들은 많은 단어를 알아.",rel:["who"]}
  ]},
 {id:91,tag:"관계사절 2",title:"who / that / which 의 사용과 생략",sub:"관계사가 '목적어'면 생략할 수 있어요",
  easy:"관계사가 뒤 문장에서 '목적어(~을/를)' 역할을 하면, 관계사를 생략할 수 있어요! (주어일 때는 생략하면 안 돼요.) 사람이면 who/whom/that, 사물이면 which/that을 써요.",
  points:["관계사가 목적어면 생략 가능 → The book (that) I read","관계사가 주어면 생략 불가 → The man who called (필요)","사람 목적격: 회화는 who, 격식체는 whom","관계사를 지워도 '명사 + 주어 + 동사' 순서면 자연스러워요"],
  ex:[
   {en:"The book that I read was fun.",ko:"내가 읽은 그 책은 재미있었어. (that 생략 가능)",rel:["that"]},
   {en:"The movie we watched was scary.",ko:"우리가 본 영화는 무서웠어. (관계사 which 생략됨)",rel:[]},
   {en:"The man who we met is a doctor.",ko:"우리가 만난 그 남자는 의사야.",rel:["who"]},
   {en:"Here is the pen you gave me.",ko:"여기 네가 나에게 준 펜이 있어. (관계사 생략됨)",rel:[]},
   {en:"The song she sang was beautiful.",ko:"그녀가 부른 노래는 아름다웠어. (관계사 생략됨)",rel:[]}
  ]},
 {id:92,tag:"관계사절 3",title:"whose / whom / where",sub:"소유 · 사람 목적격 · 장소",
  easy:"whose는 '~의'라는 소유를 나타내요(사람·사물 모두). whom은 사람이 목적어일 때 쓰는 격식체 단어예요. where는 '~하는 곳'처럼 장소를 설명해요.",
  points:["whose + 명사 → 소유 ('그의 강아지'처럼)","whom → 사람이 목적어일 때 (격식체)","where → 장소 뒤에서 '거기서 ~하다'","where 뒤에는 완전한 문장(주어+동사)이 와요"],
  ex:[
   {en:"That's the boy whose dog ran away.",ko:"저 애가 강아지가 도망간 그 소년이야.",rel:["whose"]},
   {en:"This is the park where we played.",ko:"여기가 우리가 놀던 공원이야.",rel:["where"]},
   {en:"She's the singer whose songs I love.",ko:"그녀는 내가 노래를 좋아하는 그 가수야.",rel:["whose"]},
   {en:"The man whom I met is a writer.",ko:"내가 만난 그 남자는 작가야.",rel:["whom"]},
   {en:"Busan is the city where I was born.",ko:"부산은 내가 태어난 도시야.",rel:["where"]}
  ]},
 {id:93,tag:"관계사절 4",title:"추가정보절 (1)",sub:"콤마(,)로 설명을 덧붙여요",
  easy:"이미 누구/무엇인지 아는 대상에, 콤마(,)를 찍고 '추가 정보'를 덧붙이는 관계사절이에요. 사람은 who, 사물은 which를 써요. 여기서는 that을 쓸 수 없고, 관계사도 생략할 수 없어요.",
  points:["콤마(,)가 꼭 필요해요","that은 쓰면 안 돼요 (who/which만)","관계사를 생략할 수 없어요","콤마가 있으면 '추가 정보', 없으면 '어느 것인지 구별'하는 뜻"],
  ex:[

{u:94,l:"대1",q:`'of which / of whom' 구문은 주로 어떤 영어에서 쓰나요?`,o:["일상 대화","격식체·문어체","질문할 때만","명령할 때만"],a:1,e:"격식 있는 글·문어체에서 자주 쓰여요."},

{u:94,l:"대1",q:`수량표현 + of which 를 올바르게 쓴 문장은?`,o:["The rules, most of which are outdated, need review.","The rules, most of whom are outdated, need review.","The rules, most that are outdated, need review.","The rules, most of who are outdated, need review."],a:0,e:"규칙(사물) → most of which."},

{u:95,l:"초6",q:`I found the money <code>____</code> under the bed. (그것이 숨겨져 있었다)`,o:["hiding","hid","hidden","hides"],a:2,e:"수동(which was hidden) → hidden."},

{u:95,l:"중2",q:`The man <code>____</code> the piano is my dad. (= who is playing)`,o:["played","playing","plays","play"],a:1,e:"능동 → playing."},
{u:95,l:"중2",q:`Most of the products <code>____</code> here are cheap. (그것들이 팔린다)`,o:["selling","sold","sells","sell"],a:1,e:"수동(which are sold) → sold."},
{u:95,l:"중3",q:`Reduce: "The boy who is running is fast." → "The boy <code>____</code> is fast."`,o:["run","running","ran","runs"],a:1,e:"who is running → running."},
{u:95,l:"중3",q:`Reduce: "The book that was written by her is famous." → "The book <code>____</code> by her is famous."`,o:["writing","written","wrote","writes"],a:1,e:"that was written → written(과거분사)."},
{u:95,l:"고1",q:`The information <code>____</code> on the website is old. (그것이 주어진다)`,o:["giving","given","gives","gave"],a:1,e:"수동(which is given) → given."},

{u:95,l:"대1",q:`The theory <code>____</code> by the scientist explains it well. (그것이 제안되었다)`,o:["proposing","proposed","proposes","propose"],a:1,e:"수동(which was proposed) → proposed."}

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
/* ============================ VOICE / TTS ============================ */
const voiceState={accent:"en-US",gender:"male"};
let VOICES=[];
const MALE=/\b(male|david|mark|guy|george|daniel|alex|aaron|fred|oliver|arthur|ryan|thomas|james|william|eric)\b/i;
const FEMALE=/\b(female|zira|hazel|susan|kate|samantha|karen|moira|tessa|serena|victoria|allison|ava|emma|amy|sonia|libby|jenny|aria|michelle)\b/i;
function loadVoices(){VOICES=window.speechSynthesis?speechSynthesis.getVoices():[];}
if(window.speechSynthesis){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function pickVoice(){
  const acc=voiceState.accent,gen=voiceState.gender;
  let pool=VOICES.filter(v=>v.lang&&v.lang.replace("_","-").toLowerCase().startsWith(acc.toLowerCase()));
  if(!pool.length)pool=VOICES.filter(v=>v.lang&&v.lang.toLowerCase().startsWith("en"));
  if(!pool.length)pool=VOICES;
  const rx=gen==="male"?MALE:FEMALE,other=gen==="male"?FEMALE:MALE;
  let m=pool.find(v=>rx.test(v.name));
  if(!m)m=pool.find(v=>!other.test(v.name)); // avoid clearly-opposite gender
  if(!m)m=pool[0];
  return m;
}
function speak(text){
  if(!window.speechSynthesis){alert("이 브라우저는 음성 읽기를 지원하지 않아요.");return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const v=pickVoice();
  if(v){u.voice=v;u.lang=v.lang;}else{u.lang=voiceState.accent;}
  u.rate=.92;u.pitch=voiceState.gender==="male"?.92:1.05;
  speechSynthesis.speak(u);
}
document.getElementById("segAccent").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;voiceState.accent=b.dataset.acc;[...e.currentTarget.children].forEach(c=>c.classList.toggle("on",c===b));});
document.getElementById("segGender").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;voiceState.gender=b.dataset.gen;[...e.currentTarget.children].forEach(c=>c.classList.toggle("on",c===b));});
document.getElementById("testVoice").addEventListener("click",()=>speak("This is the sentence that you will hear."));

/* ============================ TABS ============================ */
document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  const t=b.dataset.tab;
  document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("on",x===b));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("on",p.id==="panel-"+t));
  if(t==="wrong")renderWrong();
  window.scrollTo({top:0,behavior:"smooth"});
});

/* ============================ LEARN TAB ============================ */
let curUnit=0;
const REL=new Set(["who","which","that","whose","whom","where","talking","broken","swimming","sent","wanting"]);
function cleanWord(w){return w.toLowerCase().replace(/[^a-z']/g,"");}
function renderSentence(ex){
  const relset=new Set((ex.rel||[]).map(r=>r.toLowerCase()));
  return ex.en.split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok))return tok;
    const cw=cleanWord(tok);
    if(!cw)return tok;
    const isRel=relset.has(cw);
    return `<span class="w${isRel?" rel":""}" data-w="${cw}">${tok}</span>`;
  }).join("");
}
function renderUnitNav(){
  document.getElementById("unitnav").innerHTML=UNITS.map((u,i)=>
    `<button data-i="${i}" class="${i===curUnit?"on":""}"><b>${u.id}</b>${u.tag}</button>`).join("");
}
function renderLearnBody(){
  const u=UNITS[curUnit];
  document.getElementById("learnBody").innerHTML=`
   <div class="ucard">
     <div class="utag">Unit ${u.id} · ${u.tag}</div>
     <h2>${u.title}</h2>
     <p class="en-sub">${u.sub}</p>
     <div class="easybox"><p>${u.easy}</p></div>
     <ul class="points">${u.points.map(p=>`<li>${p}</li>`).join("")}</ul>
     <div class="exhead">쉬운 예문 5개 · 단어를 눌러보세요</div>
     ${u.ex.map((ex,i)=>`
       <div class="ex">
         <div class="en" data-ex="${i}">${renderSentence(ex)}</div>
         <div class="tools">
           <button data-speak="${ex.en.replace(/"/g,"&quot;")}">🔊 문장 듣기</button>
           <button data-ko="${i}">🇰🇷 해석 보기</button>
         </div>
         <div class="ko" id="ko-${curUnit}-${i}">${ex.ko}</div>
         <div class="hintword">💡 <b class="w" style="color:var(--teal-d)">파란 단어</b>가 관계사예요.</div>
       </div>`).join("")}
   </div>`;
}
function renderLearn(){renderUnitNav();renderLearnBody();}
document.getElementById("unitnav").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;curUnit=+b.dataset.i;renderLearn();window.scrollTo({top:document.querySelector(".unitnav").offsetTop-10,behavior:"smooth"});});
document.getElementById("learnBody").addEventListener("click",e=>{
  const sp=e.target.closest("button[data-speak]");if(sp){speak(sp.dataset.speak);return;}
  const ko=e.target.closest("button[data-ko]");if(ko){const el=document.getElementById(`ko-${curUnit}-${ko.dataset.ko}`);el.classList.toggle("show");ko.textContent=el.classList.contains("show")?"🇰🇷 해석 숨기기":"🇰🇷 해석 보기";return;}
  const w=e.target.closest(".w[data-w]");if(w){showTip(w);return;}
});

/* ============================ TOOLTIP ============================ */
const tip=document.getElementById("tip");
function showTip(el){
  const key=el.dataset.w;const d=VOCAB[key];
  const disp=el.textContent.replace(/[^A-Za-z']/g,"")||key;
  if(!d){
    tip.innerHTML=`<div class="tip-h"><button class="tip-x">×</button><div class="tip-word">${disp}</div><div class="tip-ipa">발음 정보 준비 중</div></div>
      <div class="tip-b"><p class="tip-mean">이 단어의 뜻은 아직 사전에 없어요. 발음은 들어볼 수 있어요.</p>
      <button class="tip-play" data-say="${disp}">🔊 발음 듣기</button></div>`;
  }else{
    tip.innerHTML=`<div class="tip-h"><button class="tip-x">×</button><div class="tip-word">${disp}</div><div class="tip-ipa">${d.ipa}</div></div>
      <div class="tip-b">
        <p class="tip-mean"><b>뜻</b> ${d.ko}</p>
        <div class="tip-ex"><span class="ee">📎 ${d.ex}</span><span class="kk">${d.exko}</span></div>
        <button class="tip-play" data-say="${disp}">🔊 발음 듣기</button>
      </div>`;
  }
  tip.style.display="block";
  const r=el.getBoundingClientRect();const tw=tip.offsetWidth,th=tip.offsetHeight;
  let left=r.left+r.width/2-tw/2;left=Math.max(10,Math.min(left,innerWidth-tw-10));
  let top=r.bottom+8;if(top+th>innerHeight-10)top=r.top-th-8;top=Math.max(10,top);
  tip.style.left=left+"px";tip.style.top=top+"px";
}
tip.addEventListener("click",e=>{
  if(e.target.closest(".tip-x")){tip.style.display="none";return;}
  const s=e.target.closest("[data-say]");if(s)speak(s.dataset.say);
});
document.addEventListener("click",e=>{if(!e.target.closest("#tip")&&!e.target.closest(".w[data-w]"))tip.style.display="none";});

/* ============================ QUIZ ============================ */
const results={}; // qi -> chosen index
let filterVal="all";
const KEYS=["A","B","C","D"];
const SHUFFLED=(()=>{const a=QUESTIONS.map((_,i)=>i);for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;})();
function matchFilter(qi){
  const q=QUESTIONS[qi];
  if(filterVal==="all")return true;
  if(filterVal==="todo")return results[qi]===undefined;
  return String(q.u)===filterVal;
}
function renderQuiz(){
  const body=document.getElementById("quizBody");
  const list=SHUFFLED.filter(matchFilter);
  if(!list.length){body.innerHTML=`<div class="empty"><div class="big">해당하는 문제가 없어요</div><p>다른 필터를 선택해 보세요.</p></div>`;updateStats();return;}
  body.innerHTML=list.map(qi=>{
    const q=QUESTIONS[qi];const chosen=results[qi];const answered=chosen!==undefined;
    const no=SHUFFLED.indexOf(qi)+1;
    return `<div class="q" data-qi="${qi}">
      <div class="qmeta"><span class="qnum">Q${no}</span><span class="badge b-un">U${q.u}</span><span class="badge b-lv">${q.l}</span></div>
      <div class="stem">${q.q}</div>
      <div class="opts">${q.o.map((op,oi)=>{
        let cls="opt";
        if(answered){cls+=" locked";if(oi===q.a)cls+=" correct";else if(oi===chosen)cls+=" wrong";}
        return `<button class="${cls}" data-oi="${oi}" ${answered?"disabled":""}><span class="key">${KEYS[oi]}</span><span>${escapeHtml(op)}</span></button>`;
      }).join("")}</div>
      <div class="explain${answered?" show":""}">${answered?(chosen===q.a?"✅ 정답! ":"❌ 오답 · 정답은 <b>"+KEYS[q.a]+"</b>. ")+q.e:""}</div>
    </div>`;
  }).join("");
  updateStats();
}
function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
document.getElementById("quizBody").addEventListener("click",e=>{
  const btn=e.target.closest(".opt");if(!btn)return;
  const card=btn.closest(".q");const qi=+card.dataset.qi;
  if(results[qi]!==undefined)return; // 이미 답함 → 수정 불가
  results[qi]=+btn.dataset.oi;
  renderQuiz();updateTabPills();
});
document.getElementById("qFilter").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;filterVal=b.dataset.f;
  [...e.currentTarget.children].forEach(c=>c.classList.toggle("on",c===b));
  renderQuiz();
});
function updateStats(){
  const done=Object.keys(results).length;
  let right=0;Object.entries(results).forEach(([qi,ch])=>{if(QUESTIONS[qi].a===ch)right++;});
  const wrong=done-right;
  document.getElementById("qDone").textContent=done;
  document.getElementById("qRight").textContent=right;
  document.getElementById("qWrong").textContent=wrong;
  document.getElementById("progBar").style.width=(done/QUESTIONS.length*100)+"%";
}
function updateTabPills(){
  document.getElementById("quizProg").textContent=Object.keys(results).length;
  const wrong=Object.entries(results).filter(([qi,ch])=>QUESTIONS[qi].a!==ch).length;
  document.getElementById("wrongCount").textContent=wrong;
}

/* ============================ WRONG NOTE ============================ */
function renderWrong(){
  const body=document.getElementById("wrongBody");
  const wrongs=SHUFFLED.filter(qi=>results[qi]!==undefined&&results[qi]!==QUESTIONS[qi].a);
  if(!wrongs.length){
    body.innerHTML=`<div class="empty"><div class="big">🎉 오답이 없어요</div><p>문제를 풀면 틀린 문제만 여기 모여요.</p></div>`;return;
  }
  body.innerHTML=`<div class="note-card">틀린 문제 <b>${wrongs.length}개</b>를 모았어요. 정답과 해설을 다시 확인해 보세요.</div>`+
   wrongs.map(qi=>{const q=QUESTIONS[qi];const ch=results[qi];
    return `<div class="q">
      <div class="qmeta"><span class="badge b-un">U${q.u}</span><span class="badge b-lv">${q.l}</span></div>
      <div class="stem">${q.q}</div>
      <div class="opts">${q.o.map((op,oi)=>{
        let cls="opt locked";if(oi===q.a)cls+=" correct";else if(oi===ch)cls+=" wrong";
        return `<button class="${cls}" disabled><span class="key">${KEYS[oi]}</span><span>${escapeHtml(op)}</span></button>`;
      }).join("")}</div>
      <div class="explain show">내 답 <b>${KEYS[ch]}</b> → 정답 <b>${KEYS[q.a]}</b> · ${q.e}</div>
    </div>`;
  }).join("");
}

/* ============================ DOCX (JSZip) ============================ */
function xmlEsc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function run(text,{b=false,i=false,sz=22,color="17222E"}={}){
  return `<w:r><w:rPr><w:rFonts w:ascii="Malgun Gothic" w:hAnsi="Malgun Gothic" w:eastAsia="Malgun Gothic"/>${b?"<w:b/>":""}${i?"<w:i/>":""}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:color w:val="${color}"/></w:rPr><w:t xml:space="preserve">${xmlEsc(text)}</w:t></w:r>`;
}
function para(runs,{spaceBefore=0,spaceAfter=120,ind=0,shade=""}={}){
  const pPr=`<w:pPr>${shade?`<w:shd w:val="clear" w:fill="${shade}"/>`:""}<w:spacing w:before="${spaceBefore}" w:after="${spaceAfter}"/>${ind?`<w:ind w:left="${ind}"/>`:""}</w:pPr>`;
  return `<w:p>${pPr}${Array.isArray(runs)?runs.join(""):runs}</w:p>`;
}
function buildDocXml(units){
  let b="";
  b+=para(run("관계사절 마스터 · Relative Clauses",{b:true,sz:44,color:"0E7C86"}),{spaceAfter:40});
  b+=para(run("Grammar in Use Intermediate · Unit 90–95 쉬운 설명 노트",{sz:22,color:"4A5A68"}),{spaceAfter:240});
  units.forEach(u=>{
    b+=para(run(`Unit ${u.id} · ${u.tag}`,{b:true,sz:20,color:"E08A2B"}),{spaceBefore:200,spaceAfter:20});
    b+=para(run(u.title,{b:true,sz:32,color:"17222E"}),{spaceAfter:20});
    b+=para(run(u.sub,{i:true,sz:22,color:"0E7C86"}),{spaceAfter:120});
    b+=para(run(u.easy,{sz:22,color:"17222E"}),{spaceAfter:120,shade:"E3F1F1"});
    b+=para(run("핵심 포인트",{b:true,sz:24,color:"0E7C86"}),{spaceBefore:120,spaceAfter:40});
    u.points.forEach(p=>{b+=para([run("• ",{b:true,sz:22,color:"E08A2B"}),run(p,{sz:22})],{ind:240,spaceAfter:40});});
    b+=para(run("쉬운 예문 5개",{b:true,sz:24,color:"0E7C86"}),{spaceBefore:120,spaceAfter:40});
    u.ex.forEach((ex,i)=>{
      b+=para([run(`${i+1}. `,{b:true,sz:22,color:"0E7C86"}),run(ex.en,{b:true,sz:22,color:"17222E"})],{ind:240,spaceAfter:20});
      b+=para(run("↳ "+ex.ko,{sz:21,color:"4A5A68"}),{ind:480,spaceAfter:100});
    });
  });
  b+=`<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134"/></w:sectPr>`;
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>${b}</w:body></w:document>`;
}
async function makeDocx(units,filename){
  if(typeof JSZip==="undefined"){alert("문서 생성 도구를 불러오지 못했어요. 인터넷 연결을 확인해 주세요.");return;}
  const zip=new JSZip();
  zip.file("[Content_Types].xml",`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
